<!DOCTYPE html>
<html>
<head>
    <title>System Hack Warning</title>
    
    <style>
        /* Body ki styling */
        body {
            background-color: black;
            color: white;
            text-align: center; /* Sab kuch center karne ke liye */
            margin-top: 50px;
            overflow-x: hidden; /* Niche scroll bar aane se rokne ke liye */
        }

        /* Stop Hacking Button ki styling */
        button {
            background-color: red;
            color: white;
            font-size: 20px;
            padding: 10px 20px;
            font-weight: bold;
            border: 2px solid white;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Gzzzz text ka auto-sliding animation */
        .glitch-text {
            font-size: 25px;
            font-weight: bold;
            color: red;
            white-space: nowrap;
            position: absolute;
            width: 100%;
            margin-top: 50px;
            
            /* Bina hover ke auto-slide karega */
            animation: moveLeft 4s linear infinite; 
        }

        /* Movement kahan se kahan tak hogi */
        @keyframes moveLeft {
            0% {
                transform: translateX(100%); /* Right side ke bahar se start */
            }
            100% {
                transform: translateX(-100%); /* Left side ke bahar nikal jayega */
            }
        }
    </style>
    </head>
<body>

    <h1>NOW IM GOING TO HACK YOUR PHONE</h1>
    
    <h2>CLICK HERE FAST TO STOP</h2>
    
    <button>STOP HACKING</button>
    
    <br><br>

    <p class="glitch-text">gzzzz gzzzzz gzzzzzzzz</p>

</body>
</html>
